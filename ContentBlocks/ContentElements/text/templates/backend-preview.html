<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
    xmlns:be="http://typo3.org/ns/TYPO3/CMS/Backend/ViewHelpers"
    data-namespace-typo3-fluid="true"
>
<f:layout name="Preview" />

<f:section name="Header">
    <f:if condition="{data.header}">
        <be:link.editRecord uid="{data.uid}" table="tt_content" fields="header">
            {data.header}
        </be:link.editRecord>
    </f:if>
</f:section>

<f:section name="Content">
    <div id="c{data.uid}" class="{data.CType}">
        <ul class="list-group">
            <f:if condition="{data.bodytext}">
                <li class="list-group-item">
                    <be:link.editRecord uid="{data.uid}" table="tt_content" fields="bodytext">
                        <core:icon identifier="actions-open" size="small" />
                        <f:translate key="LLL:EXT:frontend/Resources/Private/Language/locallang_ttc.xlf:bodytext_formlabel" />
                    </be:link.editRecord>
                    <be:link.editRecord uid="{data.uid}" table="tt_content" fields="bodytext">
                        <span>{data.bodytext -> f:format.raw()}</span>
                    </be:link.editRecord>
                </li>
            </f:if>
            

            <f:if condition="{data.header_link.url}">
                <li class="list-group-item">
                    <be:link.editRecord uid="{data.uid}" table="tt_content" fields="header_link" class="btn btn-sm btn-default btn-borderless">
                        <core:icon identifier="actions-open" size="small" />
                        <f:translate key="LLL:EXT:frontend/Resources/Private/Language/locallang_ttc.xlf:header_link" />
                    </be:link.editRecord>
                    <be:link.editRecord uid="{data.uid}" table="tt_content" fields="header_link" class="btn btn-default btn-sm">
                        <span>{data.header_link.url}</span>
                    </be:link.editRecord>
                </li>
            </f:if>
        </ul>
    </div>
</f:section>

<f:section name="Footer">
    <div class="d-flex justify-content-between">
        <be:link.editRecord uid="{data.uid}" table="tt_content">UID: {data.uid}</be:link.editRecord>
        <be:link.editRecord uid="{data.uid}" table="tt_content">PID: {data.pid}</be:link.editRecord>
    </div>
</f:section>

</html>
